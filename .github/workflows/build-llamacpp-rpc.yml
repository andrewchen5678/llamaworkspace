# Build llama.cpp with RPC enabled, pinned to one tag, for every node platform.
#
# Why this exists: distributed inference over llama.cpp RPC requires that EVERY
# node run the *identical* build (same source commit + flags), or the RPC
# protocol mismatches and crashes. The upstream prebuilt releases also do not
# ship `rpc-server` / are not built with -DGGML_RPC=ON. So we build it ourselves,
# once, from a pinned tag, for all three node platforms, and publish the binaries
# as a GitHub Release the nodes download with `fetch-llamacpp-rpc.sh`.
#
# Trigger manually: Actions tab -> "build-llamacpp-rpc" -> Run workflow
#   or: gh workflow run build-llamacpp-rpc.yml -f tag=b9701
#
# amd64 and arm64 are both little-endian and the RPC wire format is fixed-width,
# so a single tag built per-OS is cross-platform compatible.

name: build-llamacpp-rpc

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "llama.cpp git tag to build (e.g. b9701)"
        required: true
        default: "b9701"

permissions:
  contents: write   # needed to publish the Release

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      # Fail fast: if any platform build fails, cancel the others immediately
      # (a Release needs all three anyway, so finishing the rest wastes minutes).
      fail-fast: true
      matrix:
        include:
          # Two independent portability concerns, both required:
          #
          # 1. ISA portability (x86 CPU targets only). These binaries run on OTHER
          #    machines, so they must NOT be compiled with -march=native
          #    (GGML_NATIVE's default ON), which bakes in the *build runner's* ISA.
          #    A GitHub runner CPU has newer instructions (e.g. AVX-512) than an
          #    older target like a Coffee Lake i5; such a binary crashes immediately
          #    with an illegal instruction (Windows exit 0xC000001D). So on x86,
          #    GGML_NATIVE=OFF plus GGML_CPU_ALL_VARIANTS (needs GGML_BACKEND_DL):
          #    this builds one ggml-cpu library per ISA level
          #    (sse42/avx/avx2/avx512/...) and loads the best one the running CPU
          #    supports at startup — one binary works on ANY x86 box. The macOS
          #    build is exempt: it runs compute on Metal (GPU), and the runner and
          #    target are both Apple Silicon sharing the arm64 baseline.
          #
          # 2. Library loading. The binaries and their shared libs ship flat in one
          #    directory (and BACKEND_DL adds the per-ISA variant libs to it).
          #    Linux/macOS loaders don't search a binary's own dir by default, so we
          #    bake an origin-relative rpath ($ORIGIN / @loader_path) into every
          #    executable AND shared lib at link time — self-locating, no
          #    LD_LIBRARY_PATH. Windows already searches the executable's own
          #    directory, so it needs no rpath flag.
          - name: macos-arm64-metal
            runs-on: macos-latest
            # Apple Silicon: Metal + embed the shader lib so the binary is
            # self-contained (no external default.metallib to ship).
            cmake_flags: "-DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON -DGGML_RPC=ON -DLLAMA_CURL=OFF -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON -DCMAKE_INSTALL_RPATH=@loader_path"
          - name: linux-amd64-cpu
            runs-on: ubuntu-latest
            cmake_flags: "-DGGML_NATIVE=OFF -DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON -DGGML_RPC=ON -DLLAMA_CURL=OFF -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON -DCMAKE_INSTALL_RPATH='$ORIGIN'"
          - name: windows-amd64-cpu
            runs-on: windows-latest
            cmake_flags: "-DGGML_NATIVE=OFF -DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON -DGGML_RPC=ON -DLLAMA_CURL=OFF"

    steps:
      - name: Checkout llama.cpp at pinned tag
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ inputs.tag }}
          path: llama.cpp

      - name: Configure
        run: >
          cmake -S llama.cpp -B llama.cpp/build
          -DCMAKE_BUILD_TYPE=Release
          -DLLAMA_BUILD_SERVER=ON
          ${{ matrix.cmake_flags }}

      - name: Build (llama-server + rpc-server)
        # Cap parallelism with an explicit job count. A bare `-j` (no number)
        # means *unlimited* jobs for the Unix Makefiles generator, which spawns
        # one compile per ready source file at once and OOM-kills the small
        # 2-vCPU / 7 GB runner when the big TUs (httplib.cpp, llama.cpp) collide.
        # 2 matches the runner's core count, so it's no slower in practice.
        run: cmake --build llama.cpp/build --config Release --target llama-server rpc-server --parallel 2

      # Collect binaries + their shared libs into a flat staging dir. Build
      # output layout differs between single-config (Unix) and multi-config
      # (MSVC, which nests under Release/), so handle both.
      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          STAGE="stage/llama-${{ inputs.tag }}-${{ matrix.name }}"
          mkdir -p "$STAGE"
          BIN=llama.cpp/build/bin
          cp "$BIN/llama-server" "$BIN/rpc-server" "$STAGE/"
          # Bundle every shared lib the binaries link against. -L dereferences
          # symlinks so we materialize real files. The '*.so.*' pattern is
          # essential: the binaries' SONAME is versioned (e.g. libggml.so.0), and
          # matching only '*.so' would copy just the unversioned dev symlink,
          # leaving the loader unable to find libggml.so.0 at runtime.
          find "$BIN" -maxdepth 1 \( -name '*.dylib' -o -name '*.so' -o -name '*.so.*' \) -exec cp -L {} "$STAGE/" \; || true
          git -C llama.cpp rev-parse HEAD > "$STAGE/BUILD_COMMIT.txt"
          echo "tag=${{ inputs.tag }} platform=${{ matrix.name }}" >> "$STAGE/BUILD_COMMIT.txt"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "stage/llama-${{ inputs.tag }}-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $bin = "llama.cpp/build/bin/Release"
          Copy-Item "$bin/llama-server.exe","$bin/rpc-server.exe" $stage
          Get-ChildItem "$bin" -Filter *.dll | Copy-Item -Destination $stage
          (git -C llama.cpp rev-parse HEAD) | Out-File -Encoding ascii "$stage/BUILD_COMMIT.txt"
          "tag=${{ inputs.tag }} platform=${{ matrix.name }}" | Out-File -Append -Encoding ascii "$stage/BUILD_COMMIT.txt"

      - name: Zip artifact
        shell: bash
        run: |
          set -euo pipefail
          cd stage
          DIR="llama-${{ inputs.tag }}-${{ matrix.name }}"
          # Cross-platform zip: GitHub runners (incl. Windows) ship 7z/zip.
          if command -v zip >/dev/null 2>&1; then
            zip -r "../${DIR}.zip" "$DIR"
          else
            7z a "../${DIR}.zip" "$DIR"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-${{ inputs.tag }}-${{ matrix.name }}
          path: llama-${{ inputs.tag }}-${{ matrix.name }}.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish/refresh the pinned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: llamacpp-rpc-${{ inputs.tag }}
          name: "llama.cpp ${{ inputs.tag }} (RPC) binaries"
          body: >
            llama.cpp built from tag `${{ inputs.tag }}` with `-DGGML_RPC=ON`
            for all cluster node platforms. Every node must run the same build.
            Verify the matching `BUILD_COMMIT.txt` inside each zip is identical.
          files: dist/*.zip
